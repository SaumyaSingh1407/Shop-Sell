<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Shop & Sell</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to bottom,#fff0f5,#f6d6e4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#b4004e;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff4e8d,#b4004e);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<button class="login-btn">Login</button>

</form>

</div>

</body>
</html>
