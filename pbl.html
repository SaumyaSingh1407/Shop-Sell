<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop & Sell</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="buy.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">Shop & Sell</div>

        <!-- NAVBAR -->
        <nav class="nav-links">
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
            <a href="#">Home</a>
            <a href="#">Beauty</a>
            <a href="#">GenZ</a>
        </nav>

        <div class="search-box">
            <i class="bx bx-search"></i>

            <div class="marquee">
                <span>Search products to buy or sell...</span>
            </div>

            <input type="text">
        </div>

        <!-- LOGIN & SIGNUP BUTTONS -->
        <button class="btn login-btn" onclick="window.location.href='login.html'">Login</button>

        <button class="btn signup-btn">Sign Up</button>
    </header>

    <!-- Categories -->
    <section class="categories">
        <div class="category">Skincare</div>
        <div class="category">Clothing</div>
        <div class="category">Electronics</div>
        <div class="category">Books</div>
        <div class="category">Accessories</div>
        <div class="category">Furniture</div>
    </section>

    <!-- Video Banner -->
    <section class="video-section">
        <video autoplay muted loop>
            <source src="vido.mp4" type="video/mp4">
            Your browser does not support video.
        </video>

        <div class="overlay-text">
            <h1>SHOP & SELL</h1>
            <p>Buy & Sell Everything at One Place</p>
            <button>Explore Now</button>
        </div>
    </section>

</body>
</html>
